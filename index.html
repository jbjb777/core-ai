<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Core AI</title>
<link rel="icon" type="image/svg+xml" href="./logo_icon.png">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; height: 100dvh; }

  body {
    background: #000;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: row;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* Sidebar iframe — 데스크탑: flex 나란히 */
  .sidebar-frame {
    width: 260px;
    min-width: 0;
    height: 100%;
    border: none;
    flex-shrink: 0;
    transition: width 0.32s cubic-bezier(0.4,0,0.2,1),
                opacity 0.28s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    opacity: 1;
  }
  .sidebar-frame.collapsed {
    width: 0;
    opacity: 0;
  }

  /* 딤 오버레이 (모바일 전용) */
  .sidebar-dim {
    display: none;
  }

  /* Main area */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* 모바일: 사이드바를 fixed 오버레이로 */
  @media (max-width: 768px) {
    .sidebar-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      height: 100dvh;
      z-index: 200;
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.28s cubic-bezier(0.4,0,0.2,1);
      transform: translateX(0);
      opacity: 1;
    }
    .sidebar-frame.collapsed {
      transform: translateX(-100%);
      width: 260px;
      opacity: 0;
    }
    .sidebar-dim {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      opacity: 1;
      transition: opacity 0.28s ease;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .sidebar-dim.hidden {
      opacity: 0;
      pointer-events: none;
    }
  }

  /* Top Nav */
  .topnav {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    padding-top: calc(14px + env(safe-area-inset-top));
    flex-shrink: 0;
  }

  /* Sidebar toggle button */
  .btn-sidebar-toggle {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: none;
    background: none;
    color: #888;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-sidebar-toggle:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .btn-sidebar-toggle:active { transform: scale(0.82); }

  .toggle-bar {
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1),
                opacity 0.2s ease;
    transform-origin: center;
  }

  /* Center Content */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 0 24px;
    min-height: 0;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-text {
    font-size: 40px;
    font-weight: 600;
    letter-spacing: -1px;
    color: #fff;
  }

  /* Input Area */
  .input-wrapper {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .input-box {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 28px;
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within {
    border-color: #444;
  }

  /* Attach button */
  .btn-attach {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: none;
    color: #888;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-attach:hover { color: #ccc; }
  .btn-attach:active { transform: scale(0.82); }

  /* Text input */
  .chat-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
    caret-color: #fff;
    min-width: 0;
  }
  .chat-input::placeholder { color: #555; }

  /* Auto dropdown */
  .btn-auto {
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-auto:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .btn-auto:active { transform: scale(0.88); }

  /* Dropdown menu */
  .dropdown-wrap {
    position: relative;
    flex-shrink: 0;
  }
  .dropdown-menu {
    display: none;
    position: absolute;
    bottom: calc(100% + 10px);
    left: 0;
    background: #222;
    border: 1px solid #333;
    border-radius: 14px;
    overflow: hidden;
    min-width: 160px;
    z-index: 100;
    transform-origin: bottom left;
    animation: popUp 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .dropdown-menu.right-align {
    left: auto;
    right: 0;
    transform-origin: bottom right;
  }
  .dropdown-menu.open { display: block; }
  @keyframes popUp {
    from { opacity: 0; transform: scale(0.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    font-size: 14px;
    color: #ccc;
    cursor: pointer;
    transition: background 0.12s;
    white-space: nowrap;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .dropdown-item:hover { background: #2e2e2e; color: #fff; }
  .dropdown-item:active { background: #383838; }
  .dropdown-item + .dropdown-item { border-top: 1px solid #2a2a2a; }

  /* Send button */
  .btn-send {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: #fff;
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .btn-send:hover { background: #ddd; }
  .btn-send:active { transform: scale(0.78); }

  /* Chat view (conversation mode) */
  .chat-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 32px 0 0;
    min-height: 0;
  }
  .chat-view.active { display: flex; }

  .chat-messages {
    flex: 1;
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
    padding: 0 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* User bubble */
  .msg-user {
    display: flex;
    justify-content: flex-end;
  }
  .msg-user-bubble {
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 22px;
    padding: 14px 20px;
    font-size: 16px;
    color: #fff;
    max-width: 75%;
    line-height: 1.5;
    word-break: break-word;
    animation: fadeSlideUp 0.22s ease forwards;
  }

  /* AI response */
  .msg-ai {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeSlideUp 0.25s ease forwards;
  }
  .msg-ai-text {
    font-size: 16px;
    color: #fff;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* 로딩 점 애니메이션 */
  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #555;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); background: #555; }
    40% { transform: translateY(-6px); background: #aaa; }
  }

  /* Action bar under AI response */
  .msg-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }
  .action-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: none;
    color: #555;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.12s, background 0.12s, transform 0.2s cubic-bezier(0.34,1.72,0.64,1);
  }
  .action-btn:hover { color: #aaa; background: #1a1a1a; }
  .action-btn:active { transform: scale(0.80); }
  .action-meta {
    font-size: 12px;
    color: #444;
    margin-left: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Suggestion links */
  .msg-suggestions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
  }
  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #555;
    cursor: pointer;
    transition: color 0.12s;
    background: none;
    border: none;
    text-align: left;
    padding: 0;
  }
  .suggestion-item:hover { color: #aaa; }
  .suggestion-arrow {
    color: #333;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* 에러 메시지 */
  .msg-error {
    font-size: 14px;
    color: #ff6b6b;
    line-height: 1.5;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Bottom input bar (always visible) */
  .bottom-bar {
    width: 100%;
    padding: 12px 24px 20px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: #000;
  }

  /* Hero mode (initial state) */
  .hero { display: flex; flex: 1; min-height: 0; }
  .hero.hidden { display: none; }

  /* Hint pill */
  .hint-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 13px;
    color: #888;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .hint-pill:hover { border-color: #444; color: #bbb; }
  .hint-pill:active { transform: scale(0.94); }
  .hint-pill strong { color: #aaa; }
</style>
</head>
<body>

<div class="sidebar-dim hidden" id="sidebar-dim" onclick="closeSidebarMobile()"></div>
<iframe class="sidebar-frame" id="sidebar-frame" src="side.html"></iframe>

<div class="main-area">

<!-- Top Nav -->
<nav class="topnav">
  <button class="btn-sidebar-toggle" id="btn-sidebar-toggle" onclick="toggleSidebar(this)" title="사이드바 열기/닫기">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect class="toggle-bar" id="bar1" x="3" y="5" width="14" height="1.8" rx="0.9" fill="currentColor"/>
      <rect class="toggle-bar" id="bar2" x="3" y="9.1" width="10" height="1.8" rx="0.9" fill="currentColor"/>
      <rect class="toggle-bar" id="bar3" x="3" y="13.2" width="14" height="1.8" rx="0.9" fill="currentColor"/>
    </svg>
  </button>
</nav>

<!-- Chat view (conversation) -->
<div class="chat-view" id="chat-view">
  <div class="chat-messages" id="chat-messages"></div>
</div>

<!-- Center (hero) -->
<main class="center hero" id="hero">
  <div class="logo">
    <img src="logo_white.png" width="52" height="52" style="object-fit:contain;" alt="Core logo" />
    <span class="logo-text">Core</span>
  </div>
</main>

<!-- Bottom bar (always visible) -->
<div class="bottom-bar">
  <!-- Input Wrapper -->
  <div class="input-wrapper">
    <div class="input-box">

      <!-- Attach / Paperclip with dropdown -->
      <div class="dropdown-wrap">
        <button class="btn-attach" title="파일 첨부" id="btn-attach" onclick="toggleDropdown('menu-attach', this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </button>
        <div class="dropdown-menu" id="menu-attach">
          <button class="dropdown-item" onclick="selectItem('menu-attach')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.8" fill="none"/>
            </svg>
            파일 첨부
          </button>
          <button class="dropdown-item" onclick="selectItem('menu-attach')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
              <polyline points="21,15 16,10 5,21" stroke="currentColor" stroke-width="1.8" fill="none"/>
            </svg>
            스크린샷 추가
          </button>
        </div>
      </div>

      <!-- Text Input -->
      <input class="chat-input" id="chat-input" type="text" placeholder="무엇을 알고 싶으세요?" />

      <!-- Auto dropdown -->
      <div class="dropdown-wrap">
        <button class="btn-auto" id="btn-auto" onclick="toggleDropdown('menu-auto', this)">
          Auto
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="dropdown-menu right-align" id="menu-auto">
          <button class="dropdown-item" onclick="selectAutoItem('Auto', 'menu-auto')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            </svg>
            Auto
          </button>
          <button class="dropdown-item" onclick="selectAutoItem('Fast', 'menu-auto')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            Fast
          </button>
          <button class="dropdown-item" onclick="selectAutoItem('Smart', 'menu-auto')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 2a7 7 0 0 1 7 7c0 3-1.5 5-4 6.5V18a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-2.5C6.5 14 5 12 5 9a7 7 0 0 1 7-7z" stroke="currentColor" stroke-width="1.8" fill="none"/>
              <line x1="9" y1="21" x2="15" y2="21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            Smart
          </button>
        </div>
      </div>

      <!-- Send button (arrow up) -->
      <button class="btn-send" id="btn-send" title="전송" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 20V4M5 11l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 서버 주소 (필요하면 여기만 수정)
// ─────────────────────────────────────────────
const API_URL = "http://192.168.50.198:5000/generate";

const actionIconsSVG = {
  refresh: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  volume: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,
  comment: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>`,
  copy: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>`,
  share: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  like: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" stroke="currentColor" stroke-width="1.8"/></svg>`,
  dislike: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17" stroke="currentColor" stroke-width="1.8"/></svg>`,
  more: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>`
};

const suggestions = [
  '특정 주제에 대해 더 깊이 탐구하세요',
  '관련 분야의 새로운 아이디어 제안'
];

const isMobile = () => window.innerWidth <= 768;

function setSidebarState(open) {
  const frame = document.getElementById('sidebar-frame');
  const dim = document.getElementById('sidebar-dim');
  const bar2 = document.getElementById('bar2');
  if (open) {
    frame.classList.remove('collapsed');
    if (isMobile()) dim.classList.remove('hidden');
  } else {
    frame.classList.add('collapsed');
    dim.classList.add('hidden');
  }
  bar2.style.width = open ? '10px' : '14px';
}

function toggleSidebar(btn) {
  const frame = document.getElementById('sidebar-frame');
  const open = frame.classList.contains('collapsed');
  setSidebarState(open);
  btn.style.transition = 'transform 0s';
  btn.style.transform = 'scale(0.78)';
  setTimeout(() => {
    btn.style.transition = 'transform 0.35s cubic-bezier(0.34,1.72,0.64,1)';
    btn.style.transform = 'scale(1)';
  }, 60);
}

function closeSidebarMobile() {
  setSidebarState(false);
}

window.addEventListener('DOMContentLoaded', () => {
  setSidebarState(!isMobile());
});

window.addEventListener('resize', () => {
  const dim = document.getElementById('sidebar-dim');
  const frame = document.getElementById('sidebar-frame');
  if (!isMobile()) {
    dim.classList.add('hidden');
  } else if (!frame.classList.contains('collapsed')) {
    dim.classList.remove('hidden');
  }
});

function bounce(el) {
  el.style.transition = 'transform 0.0s';
  el.style.transform = 'scale(0.78)';
  setTimeout(() => {
    el.style.transition = 'transform 0.35s cubic-bezier(0.34,1.72,0.64,1)';
    el.style.transform = 'scale(1)';
  }, 60);
}

function goHome() {
  document.getElementById('hero').classList.remove('hidden');
  document.getElementById('chat-view').classList.remove('active');
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('chat-input').value = '';
  isWaiting = false;
  const sendBtn = document.getElementById('btn-send');
  sendBtn.style.opacity = '';
  sendBtn.style.pointerEvents = '';
}

let isWaiting = false;

// ─────────────────────────────────────────────
// sendMessage: 실제 API 연결 버전
// ─────────────────────────────────────────────
async function sendMessage() {
  if (isWaiting) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  isWaiting = true;
  const sendBtn = document.getElementById('btn-send');
  sendBtn.style.opacity = '0.4';
  sendBtn.style.pointerEvents = 'none';

  bounce(sendBtn);

  // 히어로 숨기고 채팅 뷰 켜기
  document.getElementById('hero').classList.add('hidden');
  document.getElementById('chat-view').classList.add('active');

  const container = document.getElementById('chat-messages');

  // 사용자 말풍선 추가
  const userDiv = document.createElement('div');
  userDiv.className = 'msg-user';
  userDiv.innerHTML = `<div class="msg-user-bubble">${escHtml(text)}</div>`;
  container.appendChild(userDiv);

  input.value = '';
  input.blur();
  container.scrollTop = container.scrollHeight;

  // AI 응답 영역 미리 추가 (로딩 점 보여주기)
  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg-ai';
  aiDiv.innerHTML = `
    <div class="msg-ai-text" id="ai-text-live">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  container.appendChild(aiDiv);
  container.scrollTop = container.scrollHeight;

  // 전송 시작 시각 기록
  const startTime = Date.now();

  try {
    // ─── 실제 API 호출 ───
    // prompt를 "User: {text}\nAssistant:" 형식으로 보내면
    // 모델이 대화 형식으로 이어서 생성함
    const prompt = `User: ${text}\nAssistant:`;

    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    if (!res.ok) throw new Error(`서버 오류: ${res.status}`);

    const data = await res.json();
    const elapsed = Date.now() - startTime;

    // 응답에서 "Assistant:" 이후 텍스트만 꺼내기
    // (모델이 전체 프롬프트+생성 텍스트를 돌려주는 경우 대비)
    let resultText = data.result || "";
    const assistantMarker = "Assistant:";
    const markerIdx = resultText.lastIndexOf(assistantMarker);
    if (markerIdx !== -1) {
      resultText = resultText.slice(markerIdx + assistantMarker.length).trim();
    }
    if (!resultText) resultText = "(응답 없음)";

    const modeLabel = document.getElementById('btn-auto').childNodes[0].textContent.trim();

    const actionsHTML = Object.entries(actionIconsSVG).map(([key, svg], i) => {
      const titles = ['재생성','읽기','댓글','복사','공유','좋아요','싫어요','더보기'];
      // 복사 버튼에는 실제 복사 기능 추가
      const extra = key === 'copy' ? `onclick="copyText(this, ${JSON.stringify(resultText)})"` : `onclick="bounce(this)"`;
      return `<button class="action-btn" title="${titles[i]}" ${extra}>${svg}</button>`;
    }).join('');

    const suggestionsHTML = suggestions.map(s =>
      `<button class="suggestion-item" onclick="bounce(this)"><span class="suggestion-arrow">↳</span>${s}</button>`
    ).join('');

    // 로딩 점 → 실제 답변으로 교체
    aiDiv.innerHTML = `
      <div class="msg-ai-text">${escHtml(resultText)}</div>
      <div class="msg-actions">
        ${actionsHTML}
        <span class="action-meta">
          <span>${elapsed}ms</span>
          <span>${modeLabel}</span>
        </span>
      </div>
      <div class="msg-suggestions">${suggestionsHTML}</div>
    `;

  } catch (err) {
    // 에러 발생 시 에러 메시지 표시
    aiDiv.innerHTML = `
      <div class="msg-ai-text msg-error">
        ⚠️ 서버에 연결할 수 없어요.<br>
        <small style="color:#888;">server.py가 실행 중인지 확인하세요.<br>${escHtml(err.message)}</small>
      </div>
    `;
  }

  container.scrollTop = container.scrollHeight;
  isWaiting = false;
  sendBtn.style.opacity = '';
  sendBtn.style.pointerEvents = '';
}

// 복사 버튼
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    bounce(btn);
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polyline points="20,6 9,17 4,12" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}

function escHtml(t) {
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function toggleDropdown(menuId, triggerEl) {
  bounce(triggerEl);
  const menu = document.getElementById(menuId);
  const isOpen = menu.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) menu.classList.add('open');
}

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
}

function selectItem(menuId) { closeAllDropdowns(); }

function selectAutoItem(label, menuId) {
  const btn = document.getElementById('btn-auto');
  btn.childNodes[0].textContent = label + ' ';
  closeAllDropdowns();
  bounce(btn);
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown-wrap')) closeAllDropdowns();
});

document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMessage();
});
</script>
