<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core – 사이드바</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 100%;
    max-width: 280px;
    min-width: 220px;
    height: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #161616;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    border-right: 1px solid #222;
    overflow: hidden;
  }

  /* ── Logo row ── */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 18px 8px;
    cursor: pointer;
    border-radius: 14px;
    margin: 8px 8px 0;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .logo-row:hover { background: rgba(255,255,255,0.06); }
  .logo-row:active { background: rgba(255,255,255,0.10); }
  .logo-row.pressed { transform: scale(0.96); }

  .logo-img {
    width: 32px;
    height: 32px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .logo-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: #222;
    margin: 12px 18px;
    flex-shrink: 0;
  }

  /* ── Nav list ── */
  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0 8px;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    color: #bbb;
    font-size: 15px;
    font-weight: 400;
    transition: background 0.15s, color 0.15s, transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    outline: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover {
    background: rgba(255,255,255,0.06);
    color: #fff;
  }
  .nav-item:active,
  .nav-item.pressed {
    background: rgba(255,255,255,0.10);
    color: #fff;
    transform: scale(0.97);
  }

  .nav-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: #666;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-item:hover .nav-icon,
  .nav-item.pressed .nav-icon {
    color: #bbb;
  }

  .nav-label {
    flex: 1;
  }

  /* ── Bottom section ── */
  .bottom-section {
    padding: 8px 8px 16px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-top: 1px solid #222;
  }
</style>
</head>
<body>

<div class="sidebar">

  <!-- Logo -->
  <a class="logo-row" href="https://core-ai.r-e.kr/index.html" target="_top" id="logo-link">
    <img class="logo-img" src="logo_color.png" alt="Core logo" />
    <span class="logo-title">Core</span>
  </a>

  <div class="divider"></div>

  <!-- Main nav -->
  <nav class="nav-list">

    <!-- 새 채팅 -->
    <a class="nav-item" href="https://core-ai.r-e.kr/index.html" target="_top">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="nav-label">새 채팅</span>
    </a>

  </nav>

  <!-- Bottom items -->
  <div class="bottom-section">

    <!-- 개인정보 처리방침 -->
    <a class="nav-item" href="https://core-ai.r-e.kr/privacy.html" target="_top">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 6v6c0 5 3.5 9.3 8 10.5C16.5 21.3 20 17 20 12V6l-8-4z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" fill="none"/>
        </svg>
      </span>
      <span class="nav-label">개인정보 처리방침</span>
    </a>

    <!-- 이용 약관 -->
    <a class="nav-item" href="https://core-ai.r-e.kr/terms.html" target="_top">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.9" fill="none"/>
          <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.9" fill="none"/>
          <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
          <line x1="8" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="nav-label">이용 약관</span>
    </a>

    <!-- 문의하기 -->
    <a class="nav-item" href="https://core-ai.r-e.kr/service.html" target="_top">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.9" fill="none"/>
        </svg>
      </span>
      <span class="nav-label">문의하기</span>
    </a>

  </div>
</div>

<script>
  // 클릭 bounce 효과 (로고 포함 전체)
  document.querySelectorAll('.nav-item, .logo-row').forEach(el => {
    el.addEventListener('pointerdown', () => {
      el.classList.add('pressed');
    });
    el.addEventListener('pointerup', () => {
      setTimeout(() => el.classList.remove('pressed'), 180);
    });
    el.addEventListener('pointerleave', () => {
      el.classList.remove('pressed');
    });
  });
</script>

</body>
</html>
